workflows:
  android-apk:
    name: BetAnalytics — Android APK
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      node: 22.14.0
      java: 17
      groups:
      - expo_credentials
      vars:
        EXPO_PUBLIC_API_URL: https://YOUR_APP.replit.app/api
        PNPM_VERSION: "10"

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true

    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate
          pnpm --version

      - name: Install workspace dependencies
        script: |
          pnpm install --no-frozen-lockfile

      - name: Build Android APK (EAS local)
        script: |
          cd artifacts/betanalytics
          EXPO_TOKEN=$EXPO_TOKEN \
          EXPO_PUBLIC_API_URL=$EXPO_PUBLIC_API_URL \
          npx eas build \
            --local \
            --platform android \
            --profile preview \
            --non-interactive \
            --output "$CM_BUILD_DIR/BetAnalytics.apk"

    artifacts:
      - $CM_BUILD_DIR/BetAnalytics.apk
      - artifacts/betanalytics/android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@example.com
        notify:
          success: true
          failure: true
